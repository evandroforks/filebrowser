services:
  filebrowser:
    container_name: filebrowser
    image: filebrowser/filebrowser:latest
    networks:
      - filebrowser
    ports:
      - 8000:80
    volumes:
      - filebrowser:/flux/vault
      # Mount the locally built binary from the dev container (run `task build` first)
      # Comment this out to use the image's built-in binary instead
      # - ./filebrowser:/bin/filebrowser:ro
    environment:
      - FB_REDIS_CACHE_URL=redis://default:filebrowser@redis:6379 # Use rediss:// for ssl

  redis:
    container_name: redis
    image: redis:latest
    networks:
      - filebrowser
    command:
      - sh
      - -c
      - |
        cat > /tmp/users.acl <<EOF
        user default on >filebrowser ~* +@all
        EOF
        redis-server --aclfile /tmp/users.acl

networks:
  filebrowser:

volumes:
  filebrowser:
